[provider]
# Primary developer for workflow commands: "claude-code" or "codex".
name = "claude-code"

[evaluation.primary]
# Evaluators are independent from the workflow provider.
provider = "claude-code"
model = "claude-opus-4-6"

[evaluation.adversarial]
provider = "codex"
model = "gpt-5.5"
effort = "xhigh"
enabled = true

[evaluation.tiers]
tier1_models = ["claude-opus-4-6"]
tier2_models = ["claude-opus-4-6", "gpt-5.5"]
tier3_models = ["claude-opus-4-6", "gpt-5.5"]
tier3_agent_team = true

[telemetry]
enabled = false
endpoint = "https://telemetry.pice.dev/v1/events"

[metrics]
db_path = ".pice/metrics.db"

[init]
project_type = "auto"

[memory]
# PICE summary memory is opt-in. When disabled, no workflow prompt receives
# recalled memory and no memory files are written.
enabled = false
# project_learnings = .pice/learnings.md; private_state = ~/.pice/state/{project_hash}/memory/records.jsonl; both = write both.
store = "project_learnings"
max_recalled_items = 6
max_tokens = 1200
# 0 disables retention-based pruning; otherwise days must be 1..3650.
retention_days = 90
write_after = ["execute", "handoff"]
read_for = ["prime", "plan", "execute"]
