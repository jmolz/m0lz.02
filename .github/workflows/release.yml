name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build and smoke artifacts without publishing"
        type: boolean
        default: true
      publish_npm:
        description: "Publish npm packages after artifact smoke"
        type: boolean
        default: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install
      - run: pnpm build

      - name: Add debug binaries to PATH
        run: echo "$GITHUB_WORKSPACE/target/debug" >> "$GITHUB_PATH"

      - run: cargo fmt --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace --all-targets
        env:
          RUST_TEST_THREADS: "1"

      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test

  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: pice
            daemon_binary: pice-daemon
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            binary: pice
            daemon_binary: pice-daemon
          - target: x86_64-apple-darwin
            os: macos-15-intel
            binary: pice
            daemon_binary: pice-daemon
          - target: aarch64-apple-darwin
            os: macos-15
            binary: pice
            daemon_binary: pice-daemon
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary: pice.exe
            daemon_binary: pice-daemon.exe
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload binary artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pice-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/${{ matrix.binary }}
            target/${{ matrix.target }}/release/${{ matrix.daemon_binary }}

  package-binaries:
    name: Package release archives
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Prepare release archives
        run: |
          mkdir -p release
          for target in x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu x86_64-apple-darwin aarch64-apple-darwin; do
            cd artifacts/pice-${target}
            chmod +x pice pice-daemon
            tar czf ../../release/pice-${target}.tar.gz pice pice-daemon
            cd ../..
          done
          cd artifacts/pice-x86_64-pc-windows-msvc
          zip ../../release/pice-x86_64-pc-windows-msvc.zip pice.exe pice-daemon.exe
          cd ../..

      - name: Upload release archives
        uses: actions/upload-artifact@v4
        with:
          name: release-binaries
          path: release/

  smoke-test:
    name: Smoke ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: package-binaries
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: pice-x86_64-unknown-linux-gnu.tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            archive: pice-aarch64-unknown-linux-gnu.tar.gz
          - target: x86_64-apple-darwin
            os: macos-15-intel
            archive: pice-x86_64-apple-darwin.tar.gz
          - target: aarch64-apple-darwin
            os: macos-15
            archive: pice-aarch64-apple-darwin.tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: pice-x86_64-pc-windows-msvc.zip
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Download release archive
        uses: actions/download-artifact@v4
        with:
          name: release-binaries
          path: ./release-binaries

      - name: Verify release archive runs
        env:
          PICE_ARTIFACT_ARCHIVE: ./release-binaries/${{ matrix.archive }}
          PICE_NPM_PACK_SMOKE: "1"
        run: node scripts/acceptance/release-artifact-smoke.mjs

  completions:
    name: Generate shell completions
    runs-on: ubuntu-latest
    needs: smoke-test
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux x64 binary
        uses: actions/download-artifact@v4
        with:
          name: pice-x86_64-unknown-linux-gnu
          path: ./bin

      - name: Generate completions
        run: |
          chmod +x ./bin/pice
          mkdir -p completions
          ./bin/pice completions bash > completions/pice.bash
          ./bin/pice completions zsh > completions/_pice
          ./bin/pice completions fish > completions/pice.fish

      - name: Upload completions artifact
        uses: actions/upload-artifact@v4
        with:
          name: completions
          path: completions/

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [package-binaries, completions, smoke-test, npm-publish]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download smoked release archives
        uses: actions/download-artifact@v4
        with:
          name: release-binaries
          path: release/

      - name: Download completions
        uses: actions/download-artifact@v4
        with:
          name: completions
          path: release/completions/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/pice-*.tar.gz
            release/pice-*.zip
            release/completions/*

  npm-publish:
    name: Publish to NPM
    runs-on: ubuntu-latest
    needs: [package-binaries, smoke-test]
    if: >-
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && inputs.dry_run == false && inputs.publish_npm == true)
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Assert release tag matches package version
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: |
          expected_tag="v$(node -p "require('./npm/pice/package.json').version")"
          if [ "${GITHUB_REF_NAME}" != "${expected_tag}" ]; then
            echo "Release tag ${GITHUB_REF_NAME} must match npm package version ${expected_tag}" >&2
            exit 1
          fi

      - name: Assert NPM token is configured
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NODE_AUTH_TOKEN}" ]; then
            echo "NPM_TOKEN is required for release npm publishing" >&2
            exit 1
          fi

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Copy binaries to NPM packages
        run: |
          for pkg_target in "aarch64-apple-darwin:pice-darwin-arm64" "x86_64-apple-darwin:pice-darwin-x64" "aarch64-unknown-linux-gnu:pice-linux-arm64" "x86_64-unknown-linux-gnu:pice-linux-x64"; do
            target="${pkg_target%%:*}"
            pkg="${pkg_target##*:}"
            cp "artifacts/pice-${target}/pice" "npm/${pkg}/pice"
            cp "artifacts/pice-${target}/pice-daemon" "npm/${pkg}/pice-daemon"
            chmod +x "npm/${pkg}/pice" "npm/${pkg}/pice-daemon"
          done
          cp artifacts/pice-x86_64-pc-windows-msvc/pice.exe npm/pice-win32-x64/pice.exe
          cp artifacts/pice-x86_64-pc-windows-msvc/pice-daemon.exe npm/pice-win32-x64/pice-daemon.exe

      - name: Local npm pack/install smoke
        env:
          PICE_NPM_PACK_SMOKE: "1"
          PICE_ARTIFACT_ARCHIVE: artifacts/release-binaries/pice-x86_64-unknown-linux-gnu.tar.gz
        run: node scripts/acceptance/release-artifact-smoke.mjs

      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          publish_package() {
            pkg_dir="$1"
            cd "npm/${pkg_dir}"
            name="$(node -p "require('./package.json').name")"
            version="$(node -p "require('./package.json').version")"
            if npm view "${name}@${version}" version >/tmp/pice-npm-view.out 2>/tmp/pice-npm-view.err; then
              echo "${name}@${version} already published; skipping"
            else
              echo "Publishing ${name}@${version}"
              npm publish --access public
            fi
            cd ../..
          }
          for pkg in pice-darwin-arm64 pice-darwin-x64 pice-linux-arm64 pice-linux-x64 pice-win32-x64; do
            publish_package "${pkg}"
          done

      - name: Publish main package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd npm/pice
          name="$(node -p "require('./package.json').name")"
          version="$(node -p "require('./package.json').version")"
          if npm view "${name}@${version}" version >/tmp/pice-npm-view-main.out 2>/tmp/pice-npm-view-main.err; then
            echo "${name}@${version} already published; skipping"
          else
            npm publish --access public
          fi
