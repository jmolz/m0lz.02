name: Windows Smoke

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows-smoke:
    name: Windows release smoke
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Native Windows smoke
        shell: pwsh
        run: ./scripts/ci/windows-smoke.ps1
